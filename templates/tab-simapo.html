<div class="rekap-header" style="margin-bottom: 12px;">
        <div class="rekap-title">📦 Sistem Inventaris (SIMAPO)</div>
      </div>
      
      <!-- Filter Instansi SIMAPO (Only visible to Superadmin) -->
      <div id="simapoInstansiSection" style="display: none; margin-bottom: 15px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08);">
        <div class="form-label" style="margin-bottom: 4px; font-weight:800; color:var(--gold);">🏢 Pilih Instansi (Superadmin)</div>
        <select id="simapoInstansiSelect" class="form-input" style="width: 100%; height: 38px; cursor: pointer; background: var(--card); color: var(--white); border: 1px solid var(--border); border-radius: 12px;"
          onchange="onSimapoInstansiChange()">
          <option value="">— Pilih Instansi —</option>
        </select>
      </div>
      
      <!-- Sub-Navigation SIMAPO (Segmented Control) -->
      <div style="margin-bottom: 18px; display:flex; padding: 5px; background: rgba(0,0,0,0.3); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); gap: 4px; overflow-x: auto; scrollbar-width: none; box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);">
        <button class="simapo-tab-btn active" id="btn-simapo-katalog" onclick="switchSimapoSection('katalog')">
          <i class="fas fa-th-large"></i> Katalog
        </button>
        <button class="simapo-tab-btn" id="btn-simapo-pinjam" onclick="switchSimapoSection('pinjam')">
          <i class="fas fa-handshake"></i> Pinjam
        </button>
        <button class="simapo-tab-btn" id="btn-simapo-tiket" onclick="switchSimapoSection('tiket')">
          <i class="fas fa-tools"></i> Lapor
        </button>
      </div>
      <style>
        .simapo-tab-btn {
          flex: 1;
          background: transparent;
          color: var(--muted);
          border: none;
          padding: 10px 0;
          font-size: 13px;
          font-weight: 700;
          border-radius: 8px;
          cursor: pointer;
          transition: all 0.3s ease;
          display: flex;
          align-items: center;
          justify-content: center;
          gap: 6px;
          min-width: 90px;
        }
        .simapo-tab-btn:hover {
          color: var(--white);
          background: rgba(255,255,255,0.05);
        }
        .simapo-tab-btn.active {
          background: var(--card-bg, #1a2332);
          color: var(--gold);
          box-shadow: 0 4px 10px rgba(0,0,0,0.3);
          border: 1px solid rgba(255,255,255,0.1);
        }
        .simapo-kat-badge {
          padding: 6px 12px;
          background: rgba(255,255,255,0.05);
          color: var(--muted);
          border: 1px solid rgba(255,255,255,0.08);
          border-radius: 20px;
          font-size: 11px;
          font-weight: 700;
          cursor: pointer;
          white-space: nowrap;
          transition: all 0.2s ease;
        }
        .simapo-kat-badge:hover {
          background: rgba(255,255,255,0.1);
          color: var(--white);
        }
        .simapo-kat-badge.active {
          background: rgba(201,168,76,0.15);
          color: var(--gold);
          border-color: rgba(201,168,76,0.4);
        }
      </style>

      <!-- SECTION: KATALOG ASET -->
      <div id="simapo-section-katalog" class="simapo-section" style="display:block;">
        <div style="border-radius: 12px; background: rgba(255,255,255,0.05); padding: 10px 14px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; margin-bottom:10px;">
          <i class="fas fa-search" style="margin-right: 10px; opacity:0.5;"></i>
          <input type="text" id="simapoSearchInput" placeholder="Cari nama barang atau kode..." oninput="if(typeof filterSimapoKatalog === 'function') filterSimapoKatalog(this.value)" autocomplete="off" style="background:transparent; border:none; color:white; width:100%; outline:none; font-family:inherit; font-size:13px;">
        </div>
        <div id="simapoKatFilterBar" style="display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:12px;"></div>
        <div id="simapoKatalogList" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px;">
           <div class="shimmer-wrapper" style="width:100%">
             <div class="shimmer sh-line" style="height:120px; border-radius:12px"></div>
           </div>
        </div>
      </div>

      <!-- SECTION: PEMINJAMAN -->
      <div id="simapo-section-pinjam" class="simapo-section" style="display:none;">
        <div class="card glass-card">
          <div class="card-title">Ajukan Peminjaman Baru</div>
          <div class="form-group" style="margin-bottom:10px; position:relative;" id="simapoPinjamWrapper">
            <label class="form-label">Pilih Aset/Barang</label>
            <div style="position:relative;">
              <input type="text" class="form-input" id="simapoSelectPinjamInput" placeholder="-- Ketik untuk mencari barang --" autocomplete="off" onfocus="this.select()" style="padding-right:36px;">
              <button type="button" id="simapoPinjamResetBtn" onclick="resetSimapoPinjamSelection()" title="Reset Pencarian" style="display:none; position:absolute; right:8px; top:50%; transform:translateY(-50%); background:rgba(239,68,68,0.15); border:none; color:#ef4444; width:26px; height:26px; border-radius:50%; cursor:pointer; font-size:14px; font-weight:700; line-height:1; transition:all 0.2s; z-index:2;" onmouseover="this.style.background='rgba(239,68,68,0.3)'" onmouseout="this.style.background='rgba(239,68,68,0.15)'">×</button>
            </div>
            <input type="hidden" id="simapoSelectPinjam">
            <div id="simapoPinjamList" style="display:none; position:absolute; top:100%; left:0; width:100%; max-height:220px; overflow-y:auto; background:#1e2329; border:1px solid rgba(255,255,255,0.15); border-radius:8px; z-index:1000; box-shadow:0 8px 24px rgba(0,0,0,0.5);">
            </div>
          </div>
          <div class="form-group" style="margin-bottom:10px;">
            <label class="form-label">Tujuan Peminjaman</label>
            <textarea class="form-textarea" id="simapoTujuanPinjam" placeholder="Untuk kegiatan apa?"></textarea>
          </div>
          <div class="form-group" style="margin-bottom:10px;">
            <label class="form-label">Jumlah Dipinjam</label>
            <input type="number" class="form-input" id="simapoPinjamJumlah" min="1" value="1">
          </div>
          <div class="form-group" style="display:flex; gap:10px; margin-bottom:10px;">
            <div style="flex:1" id="simapoColMulai">
              <label class="form-label">Tgl Mulai</label>
              <input type="date" class="form-input" id="simapoPinjamMulai">
            </div>
            <div style="flex:1" id="simapoColSelesai">
              <label class="form-label">Tgl Selesai</label>
              <input type="date" class="form-input" id="simapoPinjamSelesai">
            </div>
          </div>
          <button class="btn-primary" id="btnSimapoSubmitPinjam" onclick="if(typeof simapoSubmitPinjam === 'function') simapoSubmitPinjam()" style="width:100%">
            <div class="btn-inner"><span>📤</span> Ajukan Pinjaman</div>
          </button>
        </div>
        
        <div class="card-title" style="margin-top:20px;">Riwayat Peminjaman Saya</div>
        <div id="simapoRiwayatPinjamList">
           <div class="shimmer-wrapper">
             <div class="shimmer sh-line" style="height:60px; border-radius:12px"></div>
           </div>
        </div>
      </div>

      <!-- SECTION: LAPOR KERUSAKAN -->
      <div id="simapo-section-tiket" class="simapo-section" style="display:none;">
        <div class="card glass-card">
          <div class="card-title">Laporkan Aset Rusak</div>
          <div class="form-group" style="margin-bottom:10px;">
            <label class="form-label">Judul / Singkat Masalah</label>
            <input type="text" class="form-input" id="simapoTiketJudul" placeholder="Contoh: AC Ruang Rapat Bocor">
          </div>
          <div class="form-group" style="margin-bottom:10px;">
            <label class="form-label">Deskripsi Lengkap</label>
            <textarea class="form-textarea" id="simapoTiketDesc" placeholder="Jelaskan secara detail masalahnya..."></textarea>
          </div>
          <div class="form-group" style="margin-bottom:10px;">
            <label class="form-label">Lokasi Aset</label>
            <input type="text" class="form-input" id="simapoTiketLokasi" placeholder="Misal: Ruang Rapat Lt 2">
          </div>
          <button class="btn-primary" onclick="if(typeof simapoSubmitTiket === 'function') simapoSubmitTiket()" style="background:var(--danger); width:100%">
            <div class="btn-inner"><span>🚨</span> Kirim Laporan Kerusakan</div>
          </button>
        </div>
      </div>
