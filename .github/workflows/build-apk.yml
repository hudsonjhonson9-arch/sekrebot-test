name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Memungkinkan trigger manual dari tab Actions di GitHub

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies and Setup Capacitor
        run: |
          npm install
          node scripts/setup-capacitor.js

      - name: Copy Web Assets and Sync Capacitor
        run: |
          npx cap sync
          npx cap copy android

      - name: Build Release APK using Gradle
        run: |
          cd android && ./gradlew assembleRelease

      - name: Upload Compiled APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Absensi-Digital-Release-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload Web Bundle to Capgo (OTA Update)
        run: |
          npx @capgo/cli@latest bundle upload --channel=production
        env:
          CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
