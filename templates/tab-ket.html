<div class="user-card" style="margin-bottom:12px">
        <div class="avatar" id="ketAvatar">?</div>
        <div style="flex:1;min-width:0">
          <div class="user-name" id="ketNama">—</div>
          <div class="user-jabatan" id="ketJabatan">—</div>
          <div class="user-meta" id="ketMeta">—</div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">📝 Jenis Keterangan</div>
        <div class="jenis-grid">
          <button class="jenis-pill active" onclick="selectJenis('IZIN', this)">🙏 Izin</button>
          <button class="jenis-pill" onclick="selectJenis('SAKIT',this)">🤒 Sakit</button>
          <button class="jenis-pill" onclick="selectJenis('TUGAS',this)">💼 Tugas</button>
          <button class="jenis-pill" onclick="selectJenis('TUBEL',this)">🎓 Tubel</button>
          <button class="jenis-pill" onclick="selectJenis('CUTI',this)">🏖️ Cuti</button>
        </div>

        <!-- Izin Jam UI -->
        <div id="izinJamWrap" style="margin-bottom:12px; display:block;">
          <div id="labelIzinJam" onclick="toggleIzinJam()"
            style="cursor:pointer; padding:10px; background:var(--gold-dim); border-radius:10px; border:1px dashed var(--gold); display:flex; align-items:center; justify-content:center; gap:8px; font-size:11px; font-weight:700; color:var(--gold);">
            <input type="checkbox" id="checkIzinJam" style="display:none;" />
            <span id="izinJamIcon">⏰</span> <span id="izinJamText">IZIN PER JAM</span>
          </div>
          <div id="rowIzinJam" style="display:none; grid-template-columns:1fr 1fr; gap:8px; margin-top:8px;">
            <div><label class="form-label">🕒 JAM MULAI</label><input type="time" class="form-input" id="inJamMulai"
                style="font-family:'JetBrains Mono',monospace;" /></div>
            <div><label class="form-label">🕒 JAM SELESAI</label><input type="time" class="form-input" id="inJamSelesai"
                style="font-family:'JetBrains Mono',monospace;" /></div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">📅 Rentang Tanggal</label>
          <div style="position:relative;">
            <input type="text" id="ketDateRangePicker" class="form-input" placeholder="Ketuk untuk memilih tanggal..." readonly
              style="cursor:pointer; padding-right:40px; font-weight:600;">
            <i class="fas fa-calendar-alt" style="position:absolute; right:15px; top:50%; transform:translateY(-50%); color:var(--primary); pointer-events:none;"></i>
          </div>
          <!-- Hidden inputs for JS compatibility -->
          <input type="hidden" id="tglMulai" />
          <input type="hidden" id="tglSelesai" />
        </div>
        <div class="form-group" id="durLabel" style="display:none">
          <div
            style="font-size:11px;color:var(--gold);font-weight:600;padding:6px 10px;background:var(--gold-dim);border-radius:8px;text-align:center"
            id="durText">—</div>
        </div>
        <div class="form-group"><label class="form-label">📝 Keterangan</label><textarea class="form-textarea"
            id="ketText" placeholder="Tuliskan keterangan lengkap..."></textarea></div>
        <div class="form-group">
          <label class="form-label">📸 Bukti (Foto/Dokumen)</label>
          <input type="file" id="inputGaleri" accept="image/*,.pdf" style="display:none"
            onchange="handleBukti(event,'galeri')" />
          <div class="bukti-btn-row">
            <button type="button" class="bukti-btn" id="btnKamera" onclick="ambilFotoKeterangan()">
              <span class="bukti-btn-icon">📷</span>
              <span id="lblKamera">Ambil Foto</span>
            </button>
            <button type="button" class="bukti-btn" id="btnGaleri" onclick="$('inputGaleri').click()">
              <span class="bukti-btn-icon">📂</span>
              <span id="lblGaleri">Pilih File</span>
            </button>
          </div>
          <div class="file-preview-outer" id="buktiPreview">
            <img id="buktiImg" src="" alt="preview" />
            <button type="button" class="file-clear" onclick="clearBukti()" title="Hapus">✕</button>
            <div class="file-info-row"><span>✅</span><span id="buktiNamaText">—</span></div>
          </div>
        </div>
      </div>
      <div class="result-card" id="ketResult" style="display:none">
        <div class="r-icon" id="ketRIcon">✅</div>
        <div class="r-title" id="ketRTitle">—</div>
        <div class="r-msg" id="ketRMsg">—</div>
      </div>
      <button class="btn-primary" id="btnKet" onclick="handleKet()">
        <div class="btn-inner"><span>📤</span><span id="btnKetText">Kirim Keterangan</span></div>
      </button>

      <!-- ── Riwayat Pengajuan Keterangan ── -->
      <div class="ket-list-wrap">
        <div class="ket-list-title">
          <span>📋 Riwayat Pengajuan Saya</span>
          <button class="btn-sm-admin" onclick="loadKetStatus()" id="btnRefreshKet">🔄</button>
        </div>
        <div id="ketStatusList">
          <div class="shimmer" style="height:60px;border-radius:12px"></div>
          <div class="shimmer" style="height:60px;border-radius:12px;margin-top:8px"></div>
        </div>
      </div>

      <div class="footer">IZIN → tunggu persetujuan admin lalu broadcast · SAKIT &amp; TUGAS → otomatis disetujui &amp;
        broadcast · Sakit &gt;1 hari &amp; Tugas wajib bukti</div>
