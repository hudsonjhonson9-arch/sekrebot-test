<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Unit Test Runner - Absensi</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; padding: 20px; }
    h1 { color: #38bdf8; }
    .suite { margin-top: 20px; background: #1e293b; border-radius: 8px; padding: 15px; }
    .suite-title { font-weight: bold; font-size: 1.2em; border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 10px; }
    .test { margin: 5px 0; padding: 8px; border-radius: 4px; display: flex; justify-content: space-between; }
    .test.pass { background: rgba(34, 197, 94, 0.1); border-left: 4px solid #22c55e; }
    .test.fail { background: rgba(239, 68, 68, 0.1); border-left: 4px solid #ef4444; }
    .msg { font-family: monospace; color: #94a3b8; font-size: 0.9em; margin-top: 4px; display: block; }
    #summary { margin-top: 20px; font-size: 1.2em; font-weight: bold; }
    .summary-pass { color: #22c55e; }
    .summary-fail { color: #ef4444; }
  </style>
</head>
<body>

  <h1>🧪 BAPPERIDA Absensi - Unit Tests</h1>
  <div id="summary">Running tests...</div>
  <div id="results"></div>

  <!-- Minimal Testing Framework -->
  <script>
    const TestFramework = {
      suites: [],
      currentSuite: null,
      stats: { passed: 0, failed: 0 },
      
      describe(name, fn) {
        this.currentSuite = { name, tests: [] };
        this.suites.push(this.currentSuite);
        fn();
      },
      
      it(name, fn) {
        try {
          fn();
          this.currentSuite.tests.push({ name, pass: true });
          this.stats.passed++;
        } catch (e) {
          this.currentSuite.tests.push({ name, pass: false, error: e.message });
          this.stats.failed++;
        }
      },
      
      assert: {
        equal(actual, expected, msg) {
          if (actual !== expected) throw new Error(`${msg || ''} Expected ${expected}, but got ${actual}`);
        },
        isTrue(val, msg) {
          if (val !== true) throw new Error(`${msg || ''} Expected true, but got ${val}`);
        },
        isWithin(actual, expected, tolerance, msg) {
          if (Math.abs(actual - expected) > tolerance) {
            throw new Error(`${msg || ''} Expected ${actual} to be close to ${expected} (tol: ${tolerance})`);
          }
        }
      },
      
      render() {
        const resDiv = document.getElementById('results');
        let html = '';
        this.suites.forEach(suite => {
          html += `<div class="suite"><div class="suite-title">${suite.name}</div>`;
          suite.tests.forEach(test => {
            if (test.pass) {
              html += `<div class="test pass"><span>✔️ ${test.name}</span></div>`;
            } else {
              html += `<div class="test fail"><span>❌ ${test.name}<span class="msg">${test.error}</span></span></div>`;
            }
          });
          html += `</div>`;
        });
        resDiv.innerHTML = html;
        
        const sumDiv = document.getElementById('summary');
        if (this.stats.failed === 0) {
          sumDiv.innerHTML = `<span class="summary-pass">✅ All ${this.stats.passed} tests passed!</span>`;
        } else {
          sumDiv.innerHTML = `<span class="summary-fail">❌ ${this.stats.failed} failed, ${this.stats.passed} passed.</span>`;
        }
      }
    };

    // Global hooks
    window.describe = TestFramework.describe.bind(TestFramework);
    window.it = TestFramework.it.bind(TestFramework);
    window.assert = TestFramework.assert;
  </script>

  <!-- Load App Scripts (To be tested) -->
  <script src="../js/config.js"></script>
  <script src="../js/constants.js"></script>
  <script src="../js/helpers.js"></script>
  <script src="../js/ui.js"></script>

  <!-- Load Test Files -->
  <script src="test-helpers.js"></script>
  <script src="test-geo.js"></script>

  <!-- Run Render -->
  <script>
    window.onload = () => TestFramework.render();
  </script>
</body>
</html>
