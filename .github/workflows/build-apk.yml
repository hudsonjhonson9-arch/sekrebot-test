name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Memungkinkan trigger manual dari tab Actions di GitHub

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Dependencies and Setup Capacitor
        run: |
          npm install
          node scripts/setup-capacitor.js

      - name: Copy Web Assets and Sync Capacitor
        run: |
          npx cap sync
          npx cap copy android

      - name: Build Release APK using Gradle
        run: |
          cd android && ./gradlew assembleRelease

      # Menambahkan proses Signing secara otomatis dengan versi build-tools modern
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      # Mengubah path untuk mengambil output dari step sign_app
      - name: Upload Compiled APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Absensi-Digital-Release-APK
          path: ${{ steps.sign_app.outputs.signedReleaseFile }}

      - name: Upload Web Bundle to Capgo (OTA Update)
        run: |
          npx @capgo/cli@latest bundle upload --channel=production
        env:
          CAPGO_TOKEN: ${{ secrets.CAPGO_TOKEN }}
